<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEBO DESIGN</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#0b0b12;
color:#ffffff;
overflow-x:hidden;
}

header{
position:fixed;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-weight:800;
font-size:22px;
letter-spacing:2px;
}

.hero{
height:100vh;
background:url('images/banner.webp') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
}

.hero-content{
position:relative;
z-index:2;
animation:fadeUp 1.5s ease forwards;
opacity:0;
}

.hero h1{
font-size:60px;
font-weight:800;
letter-spacing:3px;
background:linear-gradient(90deg,#7C3AED,#9F67FF);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:15px;
color:#ccc;
font-size:18px;
}

.btn{
display:inline-block;
margin-top:30px;
padding:14px 35px;
background:#7C3AED;
color:#fff;
text-decoration:none;
border-radius:40px;
transition:0.3s;
}

.btn:hover{
background:#9F67FF;
transform:scale(1.05);
}

.section{
padding:100px 8%;
text-align:center;
}

.section h2{
font-size:34px;
margin-bottom:40px;
color:#7C3AED;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.grid img{
width:100%;
border-radius:12px;
transition:0.4s;
}

.grid img:hover{
transform:scale(1.08);
}

.counter{
font-size:60px;
font-weight:800;
color:#7C3AED;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
text-decoration:none;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
from{
opacity:0;
transform:translateY(40px);
}
}
</style>
</head>
<body>

<header>
<div class="logo">BEBO DESIGN</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>POWER YOUR BRAND</h1>
<p>Logo • Social Media • Print Design</p>
<a href="https://wa.me/201000000000?text=I%20want%20to%20build%20my%20brand" class="btn">Start Now</a>
</div>
</section>

<section class="section">
<h2>89+ Clients</h2>
<div class="counter" id="counter">0</div>
</section>

<section class="section">
<h2>Logo Design</h2>
<div class="grid">
<img src="images/logo1.webp">
<img src="images/logo2.webp">
<img src="images/logo4.webp">
<img src="images/logo5.webp">
</div>
</section>

<section class="section">
<h2>Social Media</h2>
<div class="grid">
<img src="images/social1.webp">
<img src="images/social2.webp">
<img src="images/social3.webp">
<img src="images/social4.webp">
<img src="images/social5.webp">
<img src="images/social6.webp">
</div>
</section>

<a href="https://wa.me/201092278234?text=I%20want%20to%20discuss%20my%20brand" class="whatsapp">💬</a>

<script>
let count = 0;
let target = 89;
let counter = document.getElementById("counter");

let interval = setInterval(()=>{
if(count < target){
count++;
counter.innerText = count + "+";
}else{
clearInterval(interval);
}
},20);
</script>

</body>
</html>
