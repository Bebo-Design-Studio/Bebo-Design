<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Name – Visual Identity</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0b0b12;
color:#fff;
}

/* HERO */
.project-hero{
position:relative;
height:90vh;
background:url('images/visual1.webp') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.project-hero .overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
z-index:2;
}

.hero-content h1{
font-size:60px;
color:#F59E0B;
margin-bottom:10px;
}

.hero-content p{
font-size:20px;
color:#ccc;
}

/* GALLERY */
.project-gallery{
padding:120px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px;
background:#0f0f1a;
}

.project-gallery img{
width:100%;
border-radius:20px;
}

/* COLORS */
.project-colors{
padding:120px 8%;
text-align:center;
background:#0b0b12;
}

.project-colors h2{
color:#F59E0B;
margin-bottom:60px;
}

.colors{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.color-box{
width:120px;
height:120px;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.color-box:hover{
transform:scale(1.1);
}
</style>
</head>

<body><body>

<!-- HERO COVER -->
<section class="project-hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <h1>Brand Name</h1>
    <p>Visual Identity Design</p>
  </div>
</section>

<!-- PROJECT GALLERY -->
<section class="project-gallery">
  <img src="images/visual1.webp">
  <img src="images/visual2.webp">
  <img src="images/visual3.webp">
  <img src="images/visual4.webp">
</section>

<!-- COLOR PALETTE -->
<section class="project-colors">
  <h2>Color Palette</h2>

  <div class="colors">
    <div class="color-box" data-color="#F59E0B" style="background:#F59E0B"></div>
    <div class="color-box" data-color="#111827" style="background:#111827"></div>
    <div class="color-box" data-color="#FFFFFF" style="background:#FFFFFF"></div>
  </div>

</section>

<script>
document.querySelectorAll(".color-box").forEach(box => {
  box.addEventListener("click", () => {
    alert(box.getAttribute("data-color"));
  });
});
</script>

</body></section>
</body>
</html>
